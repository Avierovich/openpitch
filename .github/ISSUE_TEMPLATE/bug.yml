name: Bug report
description: Something in the pipeline, MCP server, or dashboard is broken.
title: "[bug] <summary>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `pip install -e ".[pipeline,dev]"`
        2. `openpitch ...`
        3. ...
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - pipeline (run/extract/reconcile)
        - MCP server
        - dashboard
        - discovery / classify
        - install / packaging
        - other
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, Python version, openpitch version, install method
    validations:
      required: true
