# Daily refresh pipeline (FRD §11). Free & unlimited for public repos.
# The git-tracked data in data/ IS the database; this job rebuilds and commits it.
name: daily-refresh

on:
  schedule:
    - cron: "0 5 * * *"        # 05:00 UTC daily (cadence rationale: BRD §8 [A4])
  workflow_dispatch: {}         # allow manual runs

# Prevent overlapping runs.
concurrency:
  group: daily-refresh
  cancel-in-progress: false

permissions:
  contents: write               # commit refreshed data
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Secrets mapped once at job level; steps test the env var — the `secrets`
    # context is not valid inside step `if:` expressions (GitHub rejects the
    # whole workflow file at parse time).
    env:
      # Free-tier key, no billing attached → cannot be charged (FRD §8.6 / BRD §9.1)
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENPITCH_SEC_USER_AGENT: ${{ secrets.OPENPITCH_SEC_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[pipeline]"

      - name: Discover new AI startups (funding news + ranking lists)
        # Grows the universe automatically so new companies don't need manual adds.
        # Needs an LLM key; skipped (and the run falls back to seed) when absent.
        if: ${{ env.LLM_API_KEY != '' }}
        run: openpitch discover

      - name: Classify new companies (taxonomy + summaries)
        # Assigns main/subcategory + business summary to any newly-discovered companies
        # so the dashboard's two-level taxonomy stays populated. Only fills gaps.
        if: ${{ env.LLM_API_KEY != '' }}
        run: openpitch classify

      - name: Run pipeline (collect → … → publish)
        # Live run needs LLM_API_KEY for extraction; GROQ_API_KEY and
        # OPENPITCH_SEC_USER_AGENT improve transcription and EDGAR reliability.
        # Falls back to the committed seed (offline) when no LLM key is configured.
        # Ingests the full watchlist INCLUDING anything `discover` just added.
        # Deeper item cap => more independent sources per metric => more corroboration.
        run: openpitch run --max-source-items 25 $([ -z "$LLM_API_KEY" ] && echo --offline)

      - name: Build dashboard
        run: openpitch build-dashboard

      - name: Commit refreshed data
        run: |
          git config user.name  "openpitch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ config/discovered.yaml config/taxonomy.yaml
          git diff --cached --quiet || git commit -m "data: daily refresh + discovery"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy-pages:
    needs: refresh
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
