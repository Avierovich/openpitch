name: release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# One-time setup on PyPI: add a trusted publisher for project "openpitch",
# owner "Avierovich", repo "openpitch", workflow "release.yml", environment "pypi".
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify version matches the tag
        run: |
          PKG_VER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VER="${GITHUB_REF_NAME#v}"
          test "$PKG_VER" = "$TAG_VER" || { echo "tag $TAG_VER != pyproject $PKG_VER"; exit 1; }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
