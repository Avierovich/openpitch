# OpenPitch — Universe Watchlist (seed)
#
# Candidate pool for the dynamic top-50 (FRD §6, BRD §4.1.2).
# The VC-attention score ranks these each run and selects the top 50;
# funding-news discovery adds new candidates over time.
#
# This is a SEED list — edit freely. `note` flags status worth watching
# (e.g. IPO-filed, partial acquisition). Companies that go fully public or
# are wholly acquired should be pruned (out of scope = private companies).
#
# Fields: id (kebab) · name · category · domain · note (optional)

