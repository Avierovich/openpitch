<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenPitch logo option 4 - Git Radar</title>
  <desc id="desc">A radar and git-history mark showing freshness, versioning, and auditability.</desc>
  <rect width="1200" height="360" fill="#111827"/>
  <g transform="translate(80 50)">
    <rect width="260" height="260" rx="40" fill="#0F1320" stroke="#263244" stroke-width="2"/>
    <circle cx="130" cy="130" r="82" stroke="#273047" stroke-width="6"/>
    <circle cx="130" cy="130" r="50" stroke="#273047" stroke-width="6"/>
    <path d="M130 130L194 80" stroke="#7FD1C1" stroke-width="10" stroke-linecap="round"/>
    <path d="M130 130L69 160" stroke="#E3B341" stroke-width="10" stroke-linecap="round"/>
    <circle cx="130" cy="130" r="13" fill="#F8FAFC"/>
    <circle cx="194" cy="80" r="12" fill="#7FD1C1"/>
    <circle cx="69" cy="160" r="12" fill="#E3B341"/>
    <path d="M77 210C100 229 159 229 183 210" stroke="#2E7D6F" stroke-width="8" stroke-linecap="round"/>
