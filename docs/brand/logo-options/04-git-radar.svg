    <text x="3" y="123" fill="#9AA3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="500">fresh signals, versioned in public</text>
    <path d="M5 156H73C93 156 93 188 113 188H181" stroke="#7FD1C1" stroke-width="7" stroke-linecap="round"/>
    <circle cx="5" cy="156" r="8" fill="#7FD1C1"/>
    <circle cx="181" cy="188" r="8" fill="#E3B341"/>
  </g>
</svg>
